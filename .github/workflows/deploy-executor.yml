name: Deploy Executor

on:
  push:
    branches:
      - main
    paths:
      - "near-wallets/src/hotwallet/**"

jobs:
  deploy:
    name: Build and deploy hotwallet executor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout near-connect
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install near-wallets dependencies
        run: cd near-wallets && yarn install

      - name: Build hotwallet executor
        run: cd near-wallets && yarn build:hotwallet

      - name: Checkout near-connector-executor
        uses: actions/checkout@v4
        with:
          repository: hot-dao/near-connector-executor
          token: ${{ secrets.EXECUTOR_DEPLOY_TOKEN }}
          path: near-connector-executor

      - name: Copy executor
        run: cp repository/hotwallet.js near-connector-executor/hotwallet.js

      - name: Commit and push
        run: |
          cd near-connector-executor
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hotwallet.js
          git diff --staged --quiet || git commit -m "chore: update hotwallet executor"
          git push
