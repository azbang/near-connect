skills:
  - name: 'NEAR Connect Quickstart'
    slug: 'near-connect-quickstart'
    domain: 'connecting'
    description: 'Install, initialize NearConnector, connect/disconnect wallets, listen for signIn/signOut events, filter wallets by features, configure WalletConnect, understand manifest auto-updates'
    type: 'lifecycle'
    covers:
      - 'NearConnector constructor and options'
      - 'connect() and disconnect()'
      - 'Event system (wallet:signIn, wallet:signOut, selector:walletsChanged)'
      - 'Feature filtering (signMessage, testnet, etc.)'
      - 'WalletConnect setup'
      - 'Manifest loading and auto-updating'
      - 'Injected wallets and ParentFrameWallet'
      - 'autoConnect behavior'
      - 'Custom storage, logger, branding'
    tasks:
      - 'Add NEAR wallet connection to an app'
      - 'Set up WalletConnect for mobile wallets'
      - 'Filter available wallets by capabilities'
      - 'Handle wallet sign-in and sign-out events'
      - 'Customize wallet selector branding'
    failure_modes:
      - mistake: 'Using near-wallet-selector API instead of near-connect'
        mechanism: 'near-wallet-selector has a completely different API (setup(), store, modal, WalletSelector). Agents trained on NEAR ecosystem data default to near-wallet-selector patterns.'
        wrong_pattern: |
          import { setupWalletSelector } from "@near-wallet-selector/core";
          const selector = await setupWalletSelector({ modules: [...] });
        correct_pattern: |
          import { NearConnector } from "@hot-labs/near-connect";
          const connector = new NearConnector({ network: "mainnet" });
        source: 'https://github.com/hot-dao/near-selector — entirely different package'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['near-connect-quickstart']

      - mistake: 'Not awaiting manifest loading before calling connect'
        mechanism: 'NearConnector constructor starts loading the manifest asynchronously via whenManifestLoaded. Calling connect() or wallet() immediately without waiting can fail because the wallet list is empty.'
        wrong_pattern: |
          const connector = new NearConnector({ network: "mainnet" });
          await connector.connect();
        correct_pattern: |
          const connector = new NearConnector({ network: "mainnet" });
          await connector.whenManifestLoaded;
          await connector.connect();
        source: 'src/NearConnector.ts:89-137 — whenManifestLoaded is an async property'
        priority: 'HIGH'
        status: 'active'
        skills: ['near-connect-quickstart']

      - mistake: 'Omitting WalletConnect config causes wallets to silently disappear'
        mechanism: 'Wallets that require WalletConnect (permissions.walletConnect === true) are filtered out of the manifest if no walletConnect option is provided. No error is thrown — they simply do not appear.'
        wrong_pattern: |
          const connector = new NearConnector({ network: "mainnet" });
        correct_pattern: |
          import SignClient from "@walletconnect/sign-client";
          const wc = await SignClient.init({ projectId: "your-id", metadata: { name: "My App" } });
          const connector = new NearConnector({ network: "mainnet", walletConnect: wc });
        source: 'src/NearConnector.ts:128-133 — manifest.wallets filter removes WalletConnect wallets when no client'
        priority: 'HIGH'
        status: 'active'
        skills: ['near-connect-quickstart']

      - mistake: 'Using library in SSR without guarding browser APIs'
        mechanism: 'NearConnector uses window, document, localStorage, and IndexedDB. Importing or constructing it during server-side render throws ReferenceError or crashes.'
        wrong_pattern: |
          import { NearConnector } from "@hot-labs/near-connect";
          const connector = new NearConnector();
        correct_pattern: |
          if (typeof window !== "undefined") {
            const { NearConnector } = await import("@hot-labs/near-connect");
            const connector = new NearConnector();
          }
        source: 'src/NearConnector.ts:139-155 — window.addEventListener usage; CHANGELOG #0.6.9-10 SSR fixes'
        priority: 'HIGH'
        status: 'active'
        skills: ['near-connect-quickstart']

      - mistake: 'Using deprecated signIn constructor option'
        mechanism: 'The signIn option on NearConnectorOptions is deprecated. It adds a function-call access key during initial connection, which requires an on-chain transaction and hurts UX. Use addFunctionCallKey in connect() instead.'
        wrong_pattern: |
          new NearConnector({ signIn: { contractId: "game.near", methodNames: ["action"] } });
        correct_pattern: |
          await connector.connect({
            addFunctionCallKey: { contractId: "game.near", publicKey: "ed25519:...", allowMethods: { anyMethod: false, methodNames: ["action"] } }
          });
        source: 'src/NearConnector.ts:46-52 — @deprecated JSDoc; README § "SignIn with limited key"'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['near-connect-quickstart']

      - mistake: 'Not listening for signOut to detect wallet disconnection'
        mechanism: 'A wallet can disconnect externally (user removes access in wallet app). Without listening for wallet:signOut, the app keeps showing a connected state with stale account data.'
        wrong_pattern: |
          connector.on("wallet:signIn", (t) => { setAddress(t.accounts[0].accountId); });
        correct_pattern: |
          connector.on("wallet:signIn", (t) => { setAddress(t.accounts[0].accountId); });
          connector.on("wallet:signOut", () => { setAddress(null); });
        source: 'src/types/index.ts:212-218 — EventMap definition'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['near-connect-quickstart']

    compositions: []

  - name: 'NEAR Connect Transactions'
    slug: 'near-connect-transactions'
    domain: 'transacting'
    description: 'Action formats (ConnectorAction vs @near-js), signAndSendTransaction, signAndSendTransactions, signMessage, signInAndSignMessage, signDelegateActions, function call access keys'
    type: 'core'
    covers:
      - 'ConnectorAction format (FunctionCall, Transfer, etc.)'
      - '@near-js Action format compatibility'
      - 'signAndSendTransaction and signAndSendTransactions'
      - 'signMessage and signInAndSignMessage'
      - 'signDelegateActions'
      - 'AddFunctionCallKeyParams and gas allowance'
      - 'Network parameter fallback'
    tasks:
      - 'Send a transaction with FunctionCall action'
      - 'Sign a message for account ownership verification'
      - 'Add a function call access key during sign-in'
      - 'Sign delegate actions for meta-transactions'
      - 'Send multiple transactions in batch'
    failure_modes:
      - mistake: 'Using near-api-js action format when ConnectorAction is expected'
        mechanism: 'The library accepts both @near-js Action objects and ConnectorAction objects. Agents may write only near-api-js actions, which work but the ConnectorAction format is recommended and more portable across wallet types.'
        wrong_pattern: |
          import { transactions } from "near-api-js";
          await wallet.signAndSendTransaction({
            receiverId: "contract.near",
            actions: [transactions.functionCall("method", args, "30000000000000", "1")]
          });
        correct_pattern: |
          await wallet.signAndSendTransaction({
            receiverId: "contract.near",
            actions: [{ type: "FunctionCall", params: { methodName: "method", args: { }, gas: "30000000000000", deposit: "1" } }]
          });
        source: 'src/actions/types.ts — ConnectorAction type; README § "SignAndSendTransaction format actions"'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['near-connect-transactions']

      - mistake: 'Omitting gas and deposit in FunctionCall action'
        mechanism: 'FunctionCall requires gas (in yoctogas) and deposit (in yoctoNEAR). Omitting them or passing wrong units (e.g. NEAR instead of yoctoNEAR) causes transaction failure at the protocol level.'
        wrong_pattern: |
          actions: [{ type: "FunctionCall", params: { methodName: "ft_transfer", args: { receiver_id: "bob.near" } } }]
        correct_pattern: |
          actions: [{ type: "FunctionCall", params: { methodName: "ft_transfer", args: { receiver_id: "bob.near", amount: "1000000000000000000000000" }, gas: "30000000000000", deposit: "1" } }]
        source: 'src/actions/types.ts:10-18 — FunctionCallAction requires gas and deposit as strings'
        priority: 'HIGH'
        status: 'active'
        skills: ['near-connect-transactions']

      - mistake: 'Calling signMessage without required nonce'
        mechanism: 'signMessage requires a nonce (Uint8Array) parameter. Omitting it or passing a string/number causes the wallet to reject the message signing request.'
        wrong_pattern: |
          await wallet.signMessage({ message: "Sign in", recipient: "My App" });
        correct_pattern: |
          const nonce = crypto.getRandomValues(new Uint8Array(32));
          await wallet.signMessage({ message: "Sign in", recipient: "My App", nonce });
        source: 'src/types/index.ts:81-87 — SignMessageParams requires nonce: Uint8Array'
        priority: 'HIGH'
        status: 'active'
        skills: ['near-connect-transactions']

      - mistake: 'Confusing signMessage with signInAndSignMessage'
        mechanism: 'signMessage is a standalone call after sign-in. signInAndSignMessage combines sign-in with message signing in one wallet interaction. Using signMessage during the sign-in flow requires two wallet interactions instead of one.'
        wrong_pattern: |
          await connector.connect({ walletId: "hot-wallet" });
          const wallet = await connector.wallet();
          const nonce = crypto.getRandomValues(new Uint8Array(32));
          const signed = await wallet.signMessage({ message: "Sign in", recipient: "My App", nonce });
        correct_pattern: |
          const nonce = crypto.getRandomValues(new Uint8Array(32));
          await connector.connect({
            walletId: "hot-wallet",
            signMessageParams: { message: "Sign in", recipient: "My App", nonce }
          });
        source: 'src/types/index.ts:89 — SignMessageDuringSignInParams; src/NearConnector.ts:297-316'
        priority: 'HIGH'
        status: 'active'
        skills: ['near-connect-transactions']

      - mistake: 'Wrong gas allowance units for function call keys'
        mechanism: 'AddFunctionCallKeyParams.gasAllowance.amount is in yoctoNEAR (e.g. "250000000000000000000000" for 0.25 NEAR). Passing NEAR or a human-readable number adds a key with insufficient or excessive allowance.'
        wrong_pattern: |
          addFunctionCallKey: { contractId: "game.near", publicKey: "ed25519:...", allowMethods: { anyMethod: false, methodNames: ["play"] }, gasAllowance: { kind: "limited", amount: "0.25" } }
        correct_pattern: |
          addFunctionCallKey: { contractId: "game.near", publicKey: "ed25519:...", allowMethods: { anyMethod: false, methodNames: ["play"] }, gasAllowance: { kind: "limited", amount: "250000000000000000000000" } }
        source: 'src/NearConnector.ts:290-293 — default gasAllowance uses yoctoNEAR; src/types/index.ts:30-34'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['near-connect-transactions']

    compositions: []

